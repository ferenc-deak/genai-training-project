<div class="container">
  <h2>AI Chat</h2>

  <textarea [(ngModel)]="prompt" rows="4"></textarea>

  <br /><br />

  <button (click)="send()" [disabled]="loading || !prompt">Chat</button>

  <button (click)="sendRAG()" [disabled]="loading || !prompt">RAG</button>

  <hr />

  @if (response) {
    <div>
      <h3>Response:</h3>
      <p>{{ response }}</p>
    </div>
  }
</div>
