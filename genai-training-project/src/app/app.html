<div class="container">
  <h2>AI Chat</h2>

  <textarea
    name="area"
    class="text-area"
    [(ngModel)]="prompt"
    rows="4"
    placeholder="Ask something..."
  >
  </textarea>

  <br /><br />

  <button (click)="send()" [disabled]="loading || !prompt">
    {{ loading ? "Thinking..." : "Send" }}
  </button>

  <hr />
  @if (response) {
    <div>
      <h3>Response:</h3>
      <p>{{ response }}</p>
    </div>
  }
</div>
