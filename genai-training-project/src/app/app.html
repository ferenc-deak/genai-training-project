<div class="container">
  <h2>AI Chat</h2>

  <textarea
    name="search"
    class="text-area"
    [(ngModel)]="prompt"
    rows="4"
  ></textarea>

  <br /><br />

  <button (click)="combineBothAPICall()" [disabled]="loading || !prompt">
    Send
  </button>

  <hr />

  @if (ragResponse) {
    <div>
      <h3>📚 RAG Response:</h3>
      <p>{{ ragResponse }}</p>
    </div>
  }

  @if (aiResponse) {
    <div>
      <h3>🤖 AI Response:</h3>
      <p>{{ aiResponse }}</p>
    </div>
  }
</div>
